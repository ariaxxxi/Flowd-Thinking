<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowd</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; }
    html { scroll-behavior: smooth; }
    html, body { overflow-x: hidden; }
    body { margin: 0; background: #E8E8E4; animation: pageFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.5;  transform: scale(1); }
      50%       { opacity: 0.88; transform: scale(1.06); }
    }

    /* ── Scroll reveals ── */
    .motion-reveal {
      opacity: 0;
      transform: translateY(26px);
      transition:
        opacity  800ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--reveal-delay, 0ms);
      will-change: opacity, transform;
    }
    /* Directional variants — declared before .in-view so .in-view always wins */
    .motion-reveal[data-from-left]  { transform: translateX(-34px); }
    .motion-reveal[data-from-right] { transform: translateX(34px); }
    .motion-reveal[data-scale-in]   { transform: translateY(16px) scale(0.97); }
    .motion-reveal.in-view { opacity: 1; transform: none; }
    /* Card-level stagger inside section media */
    .motion-reveal .landing-process-grid > .landing-process-card,
    .motion-reveal .landing-now-stack > .landing-now-card,
    .motion-reveal .landing-diff-grid > .landing-diff-card,
    .motion-reveal .landing-thread-chat,
    .motion-reveal .landing-thread-list > .landing-thread-card,
    .motion-reveal .landing-thoughts-mobile-masonry .landing-thoughts-card,
    .motion-reveal .landing-collab-row .landing-raw-item,
    .motion-reveal .landing-collab-row .landing-res-item {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }
    .motion-reveal.in-view .landing-process-grid > .landing-process-card,
    .motion-reveal.in-view .landing-now-stack > .landing-now-card,
    .motion-reveal.in-view .landing-diff-grid > .landing-diff-card,
    .motion-reveal.in-view .landing-thread-chat,
    .motion-reveal.in-view .landing-thread-list > .landing-thread-card,
    .motion-reveal.in-view .landing-thoughts-mobile-masonry .landing-thoughts-card,
    .motion-reveal.in-view .landing-collab-row .landing-raw-item,
    .motion-reveal.in-view .landing-collab-row .landing-res-item {
      opacity: 1;
      transform: none;
    }
    /* Process: top->bottom, left->right */
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(1) { transition-delay: 80ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(2) { transition-delay: 220ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(3) { transition-delay: 360ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(4) { transition-delay: 500ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(5) { transition-delay: 640ms; }
    /* Now: left->right */
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(1) { transition-delay: 90ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(2) { transition-delay: 250ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(3) { transition-delay: 410ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(4) { transition-delay: 570ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(5) { transition-delay: 730ms; }
    /* Different: top->bottom, left->right */
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(1) { transition-delay: 90ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(2) { transition-delay: 260ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(3) { transition-delay: 430ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(4) { transition-delay: 600ms; }
    /* Thread flow: chat first, then right cards top->bottom */
    .motion-reveal .landing-thread-chat { transition-delay: 90ms; }
    .motion-reveal .landing-thread-list > .landing-thread-card:nth-child(1) { transition-delay: 320ms; }
    .motion-reveal .landing-thread-list > .landing-thread-card:nth-child(2) { transition-delay: 500ms; }
    /* Thoughts mobile cards: top -> bottom */
    .motion-reveal .landing-thoughts-mobile-masonry .landing-thoughts-card {
      transform: translateY(48px);
      transition-duration: 920ms;
    }
    .motion-reveal .landing-thoughts-card-chat { transition-delay: 120ms; }
    .motion-reveal .landing-thoughts-card-image { transition-delay: 280ms; }
    .motion-reveal .landing-thoughts-card-note { transition-delay: 440ms; }
    .motion-reveal .landing-thoughts-card-decision { transition-delay: 600ms; }
    .motion-reveal .landing-thoughts-card-link { transition-delay: 760ms; }
    /* Now mobile view: section head first, then cards */
    .motion-reveal .landing-project-mobile-now .landing-project-mobile-now-head,
    .motion-reveal .landing-project-mobile-now .landing-project-mobile-now-track > .landing-project-mobile-now-card > * {
      opacity: 0;
      transform: translateY(30px);
      transition:
        opacity 720ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 720ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }
    .motion-reveal.in-view .landing-project-mobile-now .landing-project-mobile-now-head,
    .motion-reveal.in-view .landing-project-mobile-now .landing-project-mobile-now-track > .landing-project-mobile-now-card > * {
      opacity: 1;
      transform: none;
    }
    .motion-reveal .landing-project-mobile-now-section:nth-child(1) .landing-project-mobile-now-head { transition-delay: 100ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(2) .landing-project-mobile-now-head { transition-delay: 260ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(3) .landing-project-mobile-now-head { transition-delay: 420ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(4) .landing-project-mobile-now-head { transition-delay: 580ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(1) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(1) > * { transition-delay: 220ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(1) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(2) > * { transition-delay: 320ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(1) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(3) > * { transition-delay: 420ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(1) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(4) > * { transition-delay: 520ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(2) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(1) > * { transition-delay: 380ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(2) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(2) > * { transition-delay: 480ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(3) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(1) > * { transition-delay: 540ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(3) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(2) > * { transition-delay: 640ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(4) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(1) > * { transition-delay: 700ms; }
    .motion-reveal .landing-project-mobile-now-section:nth-child(4) .landing-project-mobile-now-track > .landing-project-mobile-now-card:nth-child(2) > * { transition-delay: 800ms; }
    /* Human × AI: top -> bottom by row */
    .motion-reveal .landing-collab-row:nth-child(1) .landing-raw-item { transition-delay: 90ms; }
    .motion-reveal .landing-collab-row:nth-child(1) .landing-res-item { transition-delay: 150ms; }
    .motion-reveal .landing-collab-row:nth-child(2) .landing-raw-item { transition-delay: 230ms; }
    .motion-reveal .landing-collab-row:nth-child(2) .landing-res-item { transition-delay: 290ms; }
    .motion-reveal .landing-collab-row:nth-child(3) .landing-raw-item { transition-delay: 370ms; }
    .motion-reveal .landing-collab-row:nth-child(3) .landing-res-item { transition-delay: 430ms; }
    .motion-reveal .landing-collab-row:nth-child(4) .landing-raw-item { transition-delay: 510ms; }
    .motion-reveal .landing-collab-row:nth-child(4) .landing-res-item { transition-delay: 570ms; }

    /* ── Fixed nav ── */
    .nav-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      transition: background 0.5s ease, border-color 0.5s ease;
      border-bottom: 1px solid transparent;
    }
    .nav-bar.nav-scrolled {
      background: rgba(232, 232, 228, 0.86);
      border-color: rgba(0, 0, 0, 0.06);
    }
    .nav-link {
      position: relative;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .nav-link:hover { opacity: 1 !important; }
    .nav-link:hover::after { transform: scaleX(1); }

    /* ── Media card hover lift ── */
    .media-card-wrapper {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .media-card-wrapper:hover {
      transform: translateY(-5px);
      box-shadow: 0 48px 96px rgba(0, 0, 0, 0.24);
    }


    /* ── CTA form ── */
    .cta-input-wrap {
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .cta-input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.38) !important;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.07);
    }
    .cta-submit-btn {
      transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
    }
    .cta-submit-btn:hover  { transform: scale(1.05); opacity: 1 !important; }
    .cta-submit-btn:active { transform: scale(0.96); }

    /* ── Subtle link ── */
    .subtle-link .subtle-link-text {
      transition: letter-spacing 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
    }
    .subtle-link:hover .subtle-link-text { letter-spacing: 0.32em; opacity: 1; }
    .subtle-link-arrow {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
    }
    .subtle-link:hover .subtle-link-arrow { transform: translateX(5px); opacity: 1; }

    /* ── Process doc card (matched to app) ── */
    .process-doc-card{
      background:#ffffff;
      border:1px solid #e4e4e4;
      border-left:3px solid #111111;
      border-radius:20px;
      padding:14px 16px;
      width:100%;
      cursor:default;
      display:flex;
      flex-direction:column;
      gap:12px;
      transition:background .2s ease,border-color .2s ease;
    }
    .process-doc-top{display:flex;justify-content:space-between;align-items:center}
    .process-doc-type{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:8px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#aaaaaa;
    }
    .process-doc-icon{font-size:18px;line-height:1}
    .process-doc-title{
      font-family:Georgia, serif;
      font-size:18px;
      font-weight:500;
      color:#111111;
      line-height:1.35;
      margin:0;
    }
    .process-doc-preview{
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size:14px;
      color:#666666;
      line-height:1.45;
      margin:0;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .process-doc-bottom{display:flex;justify-content:space-between;align-items:center}
    .process-doc-open{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:9px;
      letter-spacing:.05em;
      color:#00000073;
      border:none;
      background:none;
      padding:0;
      cursor:default;
    }
    .process-doc-updated{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:9px;
      letter-spacing:.05em;
      color:#aaaaaa;
    }

    /* ── Thoughts cards collage (landscape 2-row layout) ── */
    .landing-process-grid-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .landing-process-grid {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: repeat(3, 200px);
      gap: 32px;
      justify-content: center;
    }
    .landing-process-card {
      background: #fff;
      border: 1px solid #ececec;
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
    }
    .landing-process-card--square {
      width: 200px;
      height: 200px;
    }
    .landing-process-card--doc {
      grid-column: span 2;
      display: block;
      padding: 0;
      border: none;
      background: transparent;
      height: 150px;
    }
    .landing-process-card--doc .process-doc-card {
      height: 100%;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
      padding: 18px 18px 14px;
      gap: 0;
      background: #f4f2f1;
    }
    .landing-process-card--doc .process-doc-top {
      margin-bottom: 10px;
    }
    .landing-process-card--doc .process-doc-title {
      margin-top: 0;
    }
    .landing-process-card--doc .process-doc-preview {
      margin-top: 6px;
      color: rgba(8, 8, 8, 0.7);
    }
    .landing-process-card--doc .process-doc-bottom {
      margin-top: auto;
    }
    .landing-process-card--image {
      padding: 0;
      border: none;
      overflow: hidden;
      background: transparent;
    }
    .landing-process-card--decision {
      background: #111111;
      border-color: #111111;
    }
    .landing-process-card--decision .landing-process-meta-item {
      color: rgba(255, 255, 255, 0.5);
    }
    .landing-process-card--decision .landing-process-meta {
      justify-content: flex-start;
    }
    .landing-process-card--decision .landing-process-decision-check,
    .landing-process-card--decision .landing-process-decision-text {
      color: #f2f2f2;
    }
    .landing-process-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .landing-process-meta-item {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .05em;
      color: #adadad;
      text-transform: uppercase;
    }
    .landing-process-note-body {
      margin-top: auto;
      padding: 8px 10px;
      border-radius: 10px;
      background-image: repeating-linear-gradient(transparent 0px, transparent 18px, rgba(173,173,173,0.5) 18px, rgba(173,173,173,0.5) 19px);
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 16px;
      line-height: 1.35;
      color: #111111;
      font-weight: 500;
    }
    .landing-process-note-text {
      display: block;
      transform: rotate(-2deg);
      transform-origin: left top;
    }
    .landing-process-link-main {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
    .landing-process-link-logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #f2f2f2;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .landing-process-link-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .landing-process-link-title {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 14px;
      font-weight: 600;
      color: #111111;
      line-height: 1.35;
    }
    .landing-process-link-url {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      color: #a8a8a8;
      letter-spacing: .03em;
      text-transform: lowercase;
    }
    .landing-process-image {
      margin-top: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      aspect-ratio: auto;
      object-fit: cover;
    }
    .landing-process-decision-body {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .landing-process-decision-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .landing-process-decision-check {
      color: #111111;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .landing-process-decision-text {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.4;
      color: #111111;
      font-weight: 500;
    }
    .landing-process-decision-label {
      margin-top: auto;
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      align-self: flex-start;
    }

    /* ── Process composite animation (scatter -> hold -> settle -> frame) ── */
    .landing-process-composite {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 24px 0 42px;
      overflow: visible;
    }
    .landing-process-composite-stage {
      position: relative;
      width: min(100%, 1080px);
      min-height: 1060px;
      overflow: visible;
    }
    .landing-process-composite-cards {
      position: absolute;
      left: 50%;
      top: 48px;
      width: 664px;
      height: 432px;
      transform: translateX(-50%);
      transform-origin: center top;
      transition: opacity 520ms cubic-bezier(0.22, 1, 0.36, 1), transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }
    .landing-process-composite-grid {
      width: 664px;
      height: 432px;
      position: relative;
      display: block;
      overflow: visible;
    }
    .landing-process-composite-grid .landing-process-card {
      position: absolute;
      margin: 0;
    }
    .landing-process-composite-grid .landing-process-composite-card--1 { left: 0; top: 0; width: 200px; height: 200px; }
    .landing-process-composite-grid .landing-process-composite-card--2 { left: 232px; top: 0; width: 200px; height: 200px; }
    .landing-process-composite-grid .landing-process-composite-card--3 { left: 464px; top: 0; width: 200px; height: 200px; }
    .landing-process-composite-grid .landing-process-composite-card--4 { left: 0; top: 232px; width: 200px; height: 200px; }
    .landing-process-composite-grid .landing-process-composite-card--5 { left: 232px; top: 232px; width: 358px; height: 150px; }
    .landing-process-composite-card {
      opacity: 0;
      transform: translate3d(var(--scatter-x, 0px), calc(var(--scatter-y, 0px) + 242px), 0) scale(0.98);
      transition-property: transform, opacity;
      transition-duration: 700ms, 700ms;
      transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1), cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: calc(var(--card-index, 0) * 120ms), calc(var(--card-index, 0) * 120ms);
      will-change: transform, opacity;
      transform-origin: top left;
    }
    .phase-scatter-in .landing-process-composite-card,
    .phase-scatter-hold .landing-process-composite-card {
      opacity: 1;
      transform: translate3d(var(--scatter-x, 0px), calc(var(--scatter-y, 0px) + 200px), 0) scale(1);
    }
    .phase-settle-phone .landing-process-composite-card,

      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

    .landing-thread-chat-messages {

    .landing-thread-chat-bubble {

      color: #111111;
      border: none;
      border-radius: 0;
      padding: 10px 0 12px 10px;
      font-family: "Roboto Serif", Georgia, serif;
      font-size: 17px;
      line-height: 1.5;
      font-weight: 400;
    }
    .landing-thread-chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px 16px;
      border-top: 1px solid #efefef;
      background: rgba(255, 255, 255, 0.4);
    }
    .landing-thread-chat-ta {
      flex: 1;
      background: #fafafa;
      border: 1px solid #ececec;
      border-radius: 20px;
      padding: 11px 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";

      color: #a8a8a8;
      line-height: 1.4;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .landing-thread-chat-send {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      border: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }
    .landing-thread-topic-callout {
      display: flex;
      align-items: center;

      white-space: nowrap;
      pointer-events: none;
    }
    .landing-thread-topic-callout-text {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a3a3a3;
    }
    .landing-thread-topic-callout-arrow {

    .landing-thread-flow-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;

    }
    .landing-thread-flow-arrow-icon {
      transform: rotate(180deg);

      height: auto;

      font-size: 24px;

      align-items: center;
      justify-content: center;
    }
    @media (max-width: 1080px) {
      .landing-thread-flow {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .landing-thread-flow-arrow {
        transform: rotate(90deg);
      }
      .landing-thread-topic-callout {
        display: flex;
      }
    }

    /* ── Collaboration frames (from flowd-landing.html) ── */
    .landing-collab-layout {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 20px;
      width: min(100%, 980px);
      max-width: 980px;
      margin: 0 auto;
      align-items: start;
    }
    .landing-collab-col {
      background: transparent;
      border: none;
      padding: 0;
    }
    .landing-collab-label {
      font-family: "Space Mono", "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;

      text-transform: uppercase;

    }
    .landing-raw-item {
      padding: 14px 16px;
      background: #e3e3e3;
      border: 1px solid #d6d6d6;

      font-style: italic;
      color: #4a4a4a;

    }
    .landing-res-item {
      padding: 14px 16px;

      border: 1px solid #ececec;

    }
    .landing-res-item--thread {

    }

    .landing-res-topline {
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 8px;

      text-transform: uppercase;

    .landing-res-thread-chip {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 3px 8px;
      border-radius: 999px;
      background: #ece8e3;
      color: #7a7269;
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      letter-spacing: .09em;
      text-transform: uppercase;

    .landing-res-title {
      font-family: Georgia, serif;
      font-size: 17px;

      margin: 0;

    }
    .landing-res-sub {

      line-height: 1.4;
      color: #707070;
      margin: 0;
    }
    .landing-res-tag {
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 8px;
      letter-spacing: .10em;

      margin-bottom: 2px;
    }
    .landing-res-tag--amber { color: #B85C10; }
    .landing-res-text {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";

      font-weight: 500;

    .landing-res-meta {

      letter-spacing: .05em;
      color: #9a9a9a;

    .landing-res-doc-head {

    .landing-res-doc-icon {

    .landing-collab-mid {

      justify-content: center;

    }
    .landing-collab-line {
      flex: 1;

    }
    .landing-collab-mid-label {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      text-transform: uppercase;
      color: #B85C10;

    @media (max-width: 860px) {
      .landing-collab-layout { grid-template-columns: 1fr; }
      .landing-collab-mid { display: none; }
    }

    /* Human x AI pair alignment overrides */
    .landing-collab-layout {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(100%, 980px);
      max-width: 980px;
      margin: 24px auto 0;
      align-items: stretch;
    }
    .landing-collab-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px minmax(0, 1fr);
      gap: 20px;
      align-items: center;
    }
    .landing-collab-label {
      margin-bottom: 0;
      color: #8d8d8d;
    }
    .landing-collab-mid {
      min-height: 20px;
      padding-top: 0;
      align-self: center;
    }
    .landing-collab-mid-label {
      writing-mode: horizontal-tb;
      padding: 0;
      color: #111111;
    }
    .landing-collab-rows {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .landing-collab-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px minmax(0, 1fr);
      gap: 20px;
      align-items: center;
    }
    .landing-collab-row-mid {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #9f9588;
      font-size: 14px;
      line-height: 1;
      user-select: none;

    .landing-collab-row .landing-raw-item,

      margin-bottom: 0;

    .landing-collab-row .landing-raw-item {
      max-width: none;
      justify-self: stretch;
    }
    .landing-collab-row .landing-res-item {
      padding: 15px 16px;
      border: none;
      border-radius: 14px;
      background: #F2F0EE;

    }
    .landing-collab-row .landing-res-item--thread {
      background: #F2F0EE;
    }
    .landing-collab-row .landing-res-item--question {
      background: #ffffff;
      border: none;
    }
    .landing-collab-row .landing-res-item--decision {
      background: #111111;
    }
    .landing-collab-row .landing-res-item--doc {
      background: #ffffff;
      border-left: 3px solid #111111;
    }
    .landing-collab-row .landing-res-title {
      font-size: 18px;
      line-height: 1.36;
      margin: 0;
    }
    .landing-collab-row .landing-res-sub {
      font-size: 14px;
      line-height: 1.52;
      color: #6f6f6f;
      margin: 0;
    }
    .landing-collab-row .landing-res-text {
      line-height: 1.52;
    }
    .landing-collab-row .landing-res-thread-chip,
    .landing-collab-row .landing-res-tag,
    .landing-collab-row .landing-res-topline,
    .landing-collab-row .landing-res-meta {
      color: #a9a9a9;
    }
    .landing-collab-row .landing-res-item--decision .landing-res-tag {
      color: rgba(255, 255, 255, 0.64);
    }
    .landing-collab-row .landing-res-item--decision .landing-res-title,
    .landing-collab-row .landing-res-item--decision .landing-res-text {
      color: #f2f2f2;
    }
    .landing-collab-row .landing-res-item--decision .landing-res-sub,
    .landing-collab-row .landing-res-item--decision .landing-res-meta {
      color: rgba(255, 255, 255, 0.62);
    }
    @media (max-width: 860px) {
      .landing-collab-head {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .landing-collab-head .landing-collab-mid {
        display: none;
      }
      .landing-collab-rows {
        gap: 14px;
      }
      .landing-collab-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .landing-collab-row .landing-raw-item {
        max-width: none;
        justify-self: stretch;
      }
      .landing-collab-row-mid {
        display: none;
      }
    }

    /* ── Quote section ── */
    .landing-quote-section {
      padding: 24px 0 72px;
      background: #E8E8E4;
    }
    .landing-quote-wrap {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 0 16px;
      text-align: center;
    }
    .landing-quote-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 72px 68px;
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    .landing-quote-mark {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Georgia, serif;
      font-size: 46px;
      line-height: 1;
      color: rgba(17,17,16,0.15);
    }
    .landing-quote-text {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 24px;
      line-height: 1.35;
      color: #111110;
      letter-spacing: -0.01em;
      max-width: 860px;
      font-style: italic;
      text-align: center;
    }
    .landing-quote-attribution {
      margin-top: 16px;
      display: block;
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8f8f8f;
    }
    @media (max-width: 860px) {
      .landing-quote-card { padding: 44px 36px; }
      .landing-quote-text { font-size: 20px; }
    }

    /* ── What makes it different ── */
    .landing-diff-grid {
      width: min(100%, 980px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 400px);
      column-gap: 32px;
      row-gap: 32px;
      justify-content: center;
    }
    .landing-diff-card {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 280px;
      width: 400px;
      max-width: 100%;
      margin: 0 auto;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
    }
    .landing-diff-card--dark {
      background: #111111;
      border-color: #111111;
      color: #ffffff;
    }
    .landing-diff-card--amber {
      background: rgba(255, 255, 255, 0.4);
      border: none;
    }
    .landing-diff-icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid #d9d9d9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #111;
    }
    .landing-diff-card--dark .landing-diff-icon {
      border-color: rgba(255,255,255,0.35);
      color: #fff;
    }
    .landing-diff-label {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8f8f8f;
    }
    .landing-diff-card--dark .landing-diff-label { color: rgba(255,255,255,0.62); }
    .landing-diff-title {
      font-family: Georgia, serif;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 400;
      color: #111;
      margin: 48px 0 0;
    }
    .landing-diff-card--dark .landing-diff-title { color: #fff; }
    .landing-diff-rule {
      border: 0;
      border-top: 1px solid #efefef;
      margin: 2px 0 0;
    }
    .landing-diff-card--dark .landing-diff-rule { border-top-color: rgba(255,255,255,0.2); }
    .landing-diff-card--amber .landing-diff-rule { border-top-color: rgba(17,17,16,0.18); }
    .landing-diff-desc {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.55;
      color: #676767;
      margin-top: auto;
    }
    .landing-diff-card--dark .landing-diff-desc { color: rgba(255,255,255,0.72); }
    .landing-diff-card--amber .landing-diff-desc { color: rgba(17,17,16,0.72); }
    @media (max-width: 860px) {
      .landing-diff-grid {
        grid-template-columns: 1fr;
        column-gap: 32px;
        row-gap: 32px;
      }
      .landing-diff-card { min-height: 0; }
      .landing-diff-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const Serif = ({ className = "", children }) => (
      <div
        className={className}
        style={{
          fontFamily:
            "Georgia, serif",
          fontWeight: 400,
        }}
      >
        {children}
      </div>
    );

    const Mono = ({ className = "", children }) => (
      <div
        className={className}
        style={{
          fontFamily:
            '"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
        }}
      >
        {children}
      </div>
    );

    const Sans = ({ className = "", children }) => (
      <div
        className={className}
        style={{
          fontFamily:
            'Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"',
        }}
      >
        {children}
      </div>
    );

    function Section({
      id,
      tone,
      eyebrow,
      headline,
      body,
      cta,
      media,
      mediaWrapClassName = "",
      sectionClassName = "",
      containerClassName = "",
      align = "center",
      vAlign = "center",
      useMediaCard = true,
      allowOverflow = false,
    }) {
      const isDark = tone === "dark";
      const baseBg = isDark ? "bg-[#111111] text-neutral-50" : "bg-[#E8E8E4] text-neutral-950";
      const subtle = isDark ? "text-neutral-300/80" : "text-neutral-600";
      const hairline = isDark ? "border-neutral-700/50" : "border-neutral-200";
      const hasCopy = Boolean(eyebrow || headline || body);
      const sectionOverflow = allowOverflow ? "overflow-visible" : "overflow-hidden";

      return (
        <section id={id} className={`${baseBg} relative min-h-[64vh] w-full ${sectionOverflow} ${sectionClassName}`}>
          {/* Breathing radial for dark sections */}
          {isDark && (
            <div
              className="pointer-events-none absolute inset-0"
              style={{
                background: "radial-gradient(900px 520px at 50% 0%, rgba(255,255,255,0.10), transparent 60%)",
                animation: "breathe 7s ease-in-out infinite",
              }}
            />
          )}

          <div className={`relative mx-auto flex min-h-[64vh] max-w-[1200px] flex-col px-6 pb-16 pt-20 sm:px-10 ${containerClassName}`}>

            {align === "center" && (
              <div className={`flex flex-1 flex-col items-center ${vAlign === "top" ? "justify-start pt-10" : "justify-center"} ${hasCopy ? "gap-10" : "gap-0"}`}>
                {hasCopy && (
                  <div className="w-full max-w-[900px] text-center motion-reveal" data-reveal data-reveal-delay="90" data-scale-in>
                    {eyebrow && <Mono className={`mb-5 text-[11px] tracking-[0.28em] ${subtle}`}>{eyebrow}</Mono>}
                    <Serif className="text-balance text-[clamp(40px,5vw,64px)] leading-[1.05]">{headline}</Serif>
                    {body && <Sans className={`mx-auto mt-6 max-w-[720px] text-pretty text-base leading-relaxed ${subtle}`}>{body}</Sans>}
                  </div>
                )}

                {media && (
                  <div className={`${mediaWrapClassName || "w-full max-w-[980px]"} motion-reveal`} data-reveal data-reveal-delay="170">
                    {useMediaCard ? <MediaCard hairline={hairline} isDark={isDark}>{media}</MediaCard> : media}
                  </div>
                )}

                {cta && <div className="pt-2 motion-reveal" data-reveal data-reveal-delay="240">{cta}</div>}
              </div>
            )}

            {align === "split" && (
              <div className="grid flex-1 grid-cols-1 items-center gap-y-10 pt-10 lg:grid-cols-2 lg:gap-x-[60px]">
                <div className="motion-reveal" data-reveal data-reveal-delay="80" data-from-left>
                  {eyebrow && <Mono className={`mb-5 text-[11px] tracking-[0.28em] ${subtle}`}>{eyebrow}</Mono>}

    function useScrolled(threshold = 40) {
      const [scrolled, setScrolled] = React.useState(false);
      React.useEffect(() => {
        const handler = () => setScrolled(window.scrollY > threshold);
        window.addEventListener("scroll", handler, { passive: true });
        return () => window.removeEventListener("scroll", handler);
      }, [threshold]);
      return scrolled;
    }

    /* ── Media card with cursor glow + hover lift ── */
    function MediaCard({ children, hairline, isDark, className = "" }) {
      const [glow, setGlow] = React.useState({ x: 50, y: 50, show: false });
      const handleMove = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        setGlow({ x: ((e.clientX - r.left) / r.width) * 100, y: ((e.clientY - r.top) / r.height) * 100, show: true });
      };
      const handleLeave = () => setGlow(g => ({ ...g, show: false }));
      return (
        <div
          className={`media-card-wrapper relative overflow-hidden rounded-3xl border ${hairline} ${isDark ? "bg-white/5" : "bg-black/5"} shadow-[0_30px_70px_rgba(0,0,0,0.18)] ${className}`}
          onMouseMove={handleMove}
          onMouseLeave={handleLeave}
        >
          {children}
          <div
            className="pointer-events-none absolute inset-0"
            style={{
              opacity: glow.show ? 1 : 0,
              transition: "opacity 0.4s ease",
              background: `radial-gradient(320px 220px at ${glow.x}% ${glow.y}%, ${isDark ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.65)"}, transparent 70%)`,
            }}
          />
        </div>
      );
    }

    function ProcessCompositeShowcase() {
      const rootRef = React.useRef(null);
      const cardsRef = React.useRef(null);
      const settleBoundsRef = React.useRef(null);
      const timersRef = React.useRef([]);
      const hasPlayedRef = React.useRef(false);
      const [phase, setPhase] = React.useState("idle");
      const [targetVars, setTargetVars] = React.useState({});

      const computeTargets = React.useCallback(() => {
        const boundsNode = settleBoundsRef.current;
        const cardsNode = cardsRef.current;
        if (!boundsNode || !cardsNode) return;

        const bounds = boundsNode.getBoundingClientRect();
        const cardsRect = cardsNode.getBoundingClientRect();
        if (!bounds.width || !cardsRect.width || !cardsRect.height) return;

        const compact = window.matchMedia("(max-width: 980px)").matches;
        const gap = 12;
        const targetCell = (bounds.width - gap) / 2;

        const sourceLayout = compact
          ? {
              note: { x: 0, y: 0, w: 185, h: 185 },
              link: { x: 207, y: 0, w: 185, h: 185 },
              image: { x: 414, y: 0, w: 185, h: 185 },
              decision: { x: 0, y: 207, w: 185, h: 185 },
              doc: { x: 207, y: 207, w: 358, h: 150 },
            }
          : {
              note: { x: 0, y: 0, w: 200, h: 200 },
              link: { x: 232, y: 0, w: 200, h: 200 },
              image: { x: 464, y: 0, w: 200, h: 200 },
              decision: { x: 0, y: 232, w: 200, h: 200 },
              doc: { x: 232, y: 232, w: 358, h: 150 },
            };

        const targetLayout = {
          note: { x: 0, y: 0, w: targetCell, h: targetCell },
          link: { x: targetCell + gap, y: 0, w: targetCell, h: targetCell },
          image: { x: 0, y: targetCell + gap, w: targetCell, h: targetCell },
          decision: { x: targetCell + gap, y: targetCell + gap, w: targetCell, h: targetCell },
          doc: { x: 0, y: (targetCell + gap) * 2, w: 358, h: 150 },
        };

        const targetOriginX = bounds.left;
        const targetOriginY = bounds.top;

        const next = {};
        const keys = ["note", "link", "image", "decision", "doc"];
        for (const key of keys) {
          const src = sourceLayout[key];
          const dst = targetLayout[key];
          if (!src || !dst) return;

          const sourceLeft = cardsRect.left + src.x;
          const sourceTop = cardsRect.top + src.y;
          const targetLeft = targetOriginX + dst.x;
          const targetTop = targetOriginY + dst.y;

          next[key] = {
            "--target-x": (targetLeft - sourceLeft).toFixed(2) + "px",
            "--target-y": (targetTop - sourceTop).toFixed(2) + "px",
            "--target-sx": (dst.w / src.w).toFixed(4),
            "--target-sy": (dst.h / src.h).toFixed(4),
          };
        }

        setTargetVars(next);
      }, []);

      React.useLayoutEffect(() => {
        let raf = requestAnimationFrame(() => {
          computeTargets();
        });

        const onResize = () => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => computeTargets());
        };

        window.addEventListener("resize", onResize);
        window.addEventListener("orientationchange", onResize);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("resize", onResize);
          window.removeEventListener("orientationchange", onResize);
        };
      }, [computeTargets]);

      React.useEffect(() => {
        const root = rootRef.current;
        if (!root || hasPlayedRef.current) return undefined;

        const clearTimers = () => {
          timersRef.current.forEach((timer) => clearTimeout(timer));
          timersRef.current = [];
        };

        const startSequence = () => {
          if (hasPlayedRef.current) return;
          hasPlayedRef.current = true;

          const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          if (prefersReduced) {
            computeTargets();
            setPhase("done");
            return;
          }

          computeTargets();

          const cardCount = 5;
          const scatterDuration = 700;
          const scatterStagger = 120;
          const scatterTotal = scatterDuration + scatterStagger * (cardCount - 1);
          const holdDuration = 500;
          const settleDuration = 1500;
          const frameDelayIntoSettle = 120;
          const frameRevealDuration = 650;

          setPhase("scatter-in");

          timersRef.current.push(setTimeout(() => {
            setPhase("scatter-hold");
          }, scatterTotal));

          timersRef.current.push(setTimeout(() => {
            computeTargets();
            setPhase("settle-phone");
          }, scatterTotal + holdDuration));

          timersRef.current.push(setTimeout(() => {
            setPhase("frame-reveal");
          }, scatterTotal + holdDuration + frameDelayIntoSettle));

          timersRef.current.push(setTimeout(() => {
            setPhase("done");
          }, scatterTotal + holdDuration + Math.max(settleDuration, frameDelayIntoSettle + frameRevealDuration) + 140));
        };

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              startSequence();
              observer.unobserve(entry.target);
            });
          },
          { threshold: 0.24, rootMargin: "0px 0px -8% 0px" },
        );

        observer.observe(root);

        return () => {
          observer.disconnect();
          clearTimers();
        };
      }, [computeTargets]);

      return (
        <div className="landing-process-composite" ref={rootRef} role="img" aria-label="Flowd process cards morphing into a complete Space view">
          <div className={"landing-process-composite-stage phase-" + phase}>
            <div ref={cardsRef} className="landing-process-composite-cards" aria-hidden={phase === "done"}>
              <div className="landing-process-composite-grid">
                <div
                  className="landing-process-card landing-process-card--square landing-process-composite-card landing-process-composite-card--1"
                  style={{ "--card-index": 0, ...(targetVars.note || {}) }}
                >
                  <div className="landing-process-meta">
                    <span className="landing-process-meta-item">2026/03/04</span>
                    <span className="landing-process-meta-item">note.txt</span>
                  </div>
                  <div className="landing-process-note-body"><span className="landing-process-note-text">Three zones: Now, Thoughts, Thread. Raw capture first, structure later.</span></div>
                </div>

                <div
                  className="landing-process-card landing-process-card--square landing-process-composite-card landing-process-composite-card--2"
                  style={{ "--card-index": 1, ...(targetVars.link || {}) }}
                >
                  <div className="landing-process-meta">
                    <span className="landing-process-meta-item">2026/03/03</span>
                    <span className="landing-process-meta-item">link.url</span>
                  </div>
                  <div className="landing-process-link-main">
                    <div className="landing-process-link-logo">⌘</div>
                    <div className="landing-process-link-text">
                      <span className="landing-process-link-title">Thinking OS references</span>
                      <span className="landing-process-link-url">flowd.run/research/context-systems</span>
                    </div>
                  </div>
                </div>

                <div
                  className="landing-process-card landing-process-card--square landing-process-card--image landing-process-composite-card landing-process-composite-card--3"
                  style={{ "--card-index": 2, ...(targetVars.image || {}) }}
                >
                  <img src="https://i.pinimg.com/avif/736x/c9/28/89/c92889fb0316cbd99c518fdfadeeed57.avf" alt="" className="landing-process-image" />
                </div>

                <div
                  className="landing-process-card landing-process-card--square landing-process-card--decision landing-process-composite-card landing-process-composite-card--4"
                  style={{ "--card-index": 3, ...(targetVars.decision || {}) }}
                >
                  <div className="landing-process-meta">
                    <span className="landing-process-meta-item">2026/03/05</span>
                  </div>
                  <div className="landing-process-decision-body">
                    <div className="landing-process-decision-line">
                      <span className="landing-process-decision-check">✓</span>
                      <span className="landing-process-decision-text">Start with mobile only</span>
                    </div>
                    <div className="landing-process-decision-line">
                      <span className="landing-process-decision-check">✓</span>
                      <span className="landing-process-decision-text">Position as Thinking OS</span>
                    </div>
                  </div>
                  <span className="landing-process-decision-label">✓ decided</span>
                </div>

                <div
                  className="landing-process-card landing-process-card--doc landing-process-composite-card landing-process-composite-card--5"
                  style={{ "--card-index": 4, ...(targetVars.doc || {}) }}
                >
                  <div className="process-doc-card">

    function FlowdLandingPage() {
      React.useEffect(() => {
        const nodes = Array.from(document.querySelectorAll("[data-reveal]"));
        if (nodes.length === 0) return undefined;
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              // Apply staggered delay from data attribute before triggering transition
              const delay = entry.target.dataset.revealDelay || "0";
              entry.target.style.setProperty("--reveal-delay", `${delay}ms`);
              entry.target.classList.add("in-view");
              observer.unobserve(entry.target);
            });
          },
          { threshold: 0.10, rootMargin: "0px 0px -6% 0px" },
        );
        nodes.forEach((node) => observer.observe(node));
        return () => observer.disconnect();
      }, []);

      React.useEffect(() => {
        const rails = Array.from(document.querySelectorAll(".landing-project-mobile-now-rail"));
        if (rails.length === 0) return undefined;
        const resetTimers = new Map();
        const onRailScroll = (event) => {
          const rail = event.currentTarget;
          rail.classList.add("is-scrolling");
          const current = resetTimers.get(rail);
          if (current) clearTimeout(current);
          const next = setTimeout(() => {
            rail.classList.remove("is-scrolling");
            resetTimers.delete(rail);
          }, 160);
          resetTimers.set(rail, next);
        };
        rails.forEach((rail) => rail.addEventListener("scroll", onRailScroll, { passive: true }));
        return () => {
          rails.forEach((rail) => {
            rail.removeEventListener("scroll", onRailScroll);
            rail.classList.remove("is-scrolling");
          });
          resetTimers.forEach((timer) => clearTimeout(timer));
          resetTimers.clear();
        };
      }, []);

      return (
        <div className="min-h-screen w-full bg-[#E8E8E4]">
          <Nav />
          <Section
            id="hero"
            vAlign="center"
            tone="light"
            sectionClassName="min-h-screen"
            containerClassName="min-h-screen"
            eyebrow={<span className="opacity-60">PERSONAL THINKING OS</span>}
            headline={
              <span style={{ fontSize: "72px", lineHeight: "1.04" }}>
                A creative space for
                <br />
                <em className="opacity-40">non-linear thinking.</em>
              </span>
            }
            body={
              <span className="mx-auto block max-w-[560px]">
                Flowd is a thinking space built for how ADHD brains actually work — raw and fast in, organized over time, always where you left off.
              </span>
            }
            cta={<SubtleLink href="#early-access">EARLY ACCESS</SubtleLink>}
            align="center"
          />

          <Section
            id="different"
            tone="light"
            eyebrow="WHAT MAKES IT DIFFERENT"
            headline={
              <>
