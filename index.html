<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowd Landing (React)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; }
    html, body { overflow-x: hidden; }
    body { margin: 0; background: #F0F0ED; animation: pageFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both; }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.5;  transform: scale(1); }
      50%       { opacity: 0.88; transform: scale(1.06); }
    }

    /* ── Scroll reveals ── */
    .motion-reveal {
      opacity: 0;
      transform: translateY(26px);
      transition:
        opacity  800ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--reveal-delay, 0ms);
      will-change: opacity, transform;
    }
    /* Directional variants — declared before .in-view so .in-view always wins */
    .motion-reveal[data-from-left]  { transform: translateX(-34px); }
    .motion-reveal[data-from-right] { transform: translateX(34px); }
    .motion-reveal[data-scale-in]   { transform: translateY(16px) scale(0.97); }
    .motion-reveal.in-view { opacity: 1; transform: none; }
    /* Card-level stagger inside section media */
    .motion-reveal .landing-process-grid > .landing-process-card,
    .motion-reveal .landing-now-stack > .landing-now-card,
    .motion-reveal .landing-diff-grid > .landing-diff-card,
    .motion-reveal .landing-thread-chat,
    .motion-reveal .landing-thread-list > .landing-thread-card,
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card,
    .motion-reveal .landing-collab-col:first-child .landing-raw-item,
    .motion-reveal .landing-collab-col:last-child .landing-res-item {
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 700ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }
    .motion-reveal.in-view .landing-process-grid > .landing-process-card,
    .motion-reveal.in-view .landing-now-stack > .landing-now-card,
    .motion-reveal.in-view .landing-diff-grid > .landing-diff-card,
    .motion-reveal.in-view .landing-thread-chat,
    .motion-reveal.in-view .landing-thread-list > .landing-thread-card,
    .motion-reveal.in-view .landing-project-mobile-cards > .landing-project-mobile-card,
    .motion-reveal.in-view .landing-collab-col:first-child .landing-raw-item,
    .motion-reveal.in-view .landing-collab-col:last-child .landing-res-item {
      opacity: 1;
      transform: none;
    }
    /* Process: top->bottom, left->right */
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(1) { transition-delay: 80ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(2) { transition-delay: 220ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(3) { transition-delay: 360ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(4) { transition-delay: 500ms; }
    .motion-reveal .landing-process-grid > .landing-process-card:nth-child(5) { transition-delay: 640ms; }
    /* Now: left->right */
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(1) { transition-delay: 90ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(2) { transition-delay: 250ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(3) { transition-delay: 410ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(4) { transition-delay: 570ms; }
    .motion-reveal .landing-now-stack > .landing-now-card:nth-child(5) { transition-delay: 730ms; }
    /* Different: top->bottom, left->right */
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(1) { transition-delay: 90ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(2) { transition-delay: 260ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(3) { transition-delay: 430ms; }
    .motion-reveal .landing-diff-grid > .landing-diff-card:nth-child(4) { transition-delay: 600ms; }
    /* Thread flow: chat first, then right cards top->bottom */
    .motion-reveal .landing-thread-chat { transition-delay: 90ms; }
    .motion-reveal .landing-thread-list > .landing-thread-card:nth-child(1) { transition-delay: 320ms; }
    .motion-reveal .landing-thread-list > .landing-thread-card:nth-child(2) { transition-delay: 500ms; }
    /* Project mobile cards: top -> bottom */
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card {
      transform: translateY(48px);
      transition-duration: 920ms;
    }
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card:nth-child(1) { transition-delay: 120ms; }
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card:nth-child(2) { transition-delay: 320ms; }
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card:nth-child(3) { transition-delay: 520ms; }
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card:nth-child(4) { transition-delay: 720ms; }
    .motion-reveal .landing-project-mobile-cards > .landing-project-mobile-card:nth-child(5) { transition-delay: 920ms; }
    /* Human × AI: top -> bottom by row */
    .motion-reveal .landing-collab-col:first-child .landing-raw-item:nth-of-type(1) { transition-delay: 90ms; }
    .motion-reveal .landing-collab-col:last-child .landing-res-item:nth-of-type(1) { transition-delay: 150ms; }
    .motion-reveal .landing-collab-col:first-child .landing-raw-item:nth-of-type(2) { transition-delay: 230ms; }
    .motion-reveal .landing-collab-col:last-child .landing-res-item:nth-of-type(2) { transition-delay: 290ms; }
    .motion-reveal .landing-collab-col:first-child .landing-raw-item:nth-of-type(3) { transition-delay: 370ms; }
    .motion-reveal .landing-collab-col:last-child .landing-res-item:nth-of-type(3) { transition-delay: 430ms; }
    .motion-reveal .landing-collab-col:first-child .landing-raw-item:nth-of-type(4) { transition-delay: 510ms; }
    .motion-reveal .landing-collab-col:last-child .landing-res-item:nth-of-type(4) { transition-delay: 570ms; }

    /* ── Fixed nav ── */
    .nav-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      transition: background 0.5s ease, border-color 0.5s ease;
      border-bottom: 1px solid transparent;
    }
    .nav-bar.nav-scrolled {
      background: rgba(240, 240, 237, 0.86);
      border-color: rgba(0, 0, 0, 0.06);
    }
    .nav-link {
      position: relative;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .nav-link:hover { opacity: 1 !important; }
    .nav-link:hover::after { transform: scaleX(1); }

    /* ── Media card hover lift ── */
    .media-card-wrapper {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .media-card-wrapper:hover {
      transform: translateY(-5px);
      box-shadow: 0 48px 96px rgba(0, 0, 0, 0.24);
    }


    /* ── CTA form ── */
    .cta-input-wrap {
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .cta-input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.38) !important;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.07);
    }
    .cta-submit-btn {
      transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
    }
    .cta-submit-btn:hover  { transform: scale(1.05); opacity: 1 !important; }
    .cta-submit-btn:active { transform: scale(0.96); }

    /* ── Subtle link ── */
    .subtle-link .subtle-link-text {
      transition: letter-spacing 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
    }
    .subtle-link:hover .subtle-link-text { letter-spacing: 0.32em; opacity: 1; }
    .subtle-link-arrow {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
    }
    .subtle-link:hover .subtle-link-arrow { transform: translateX(5px); opacity: 1; }

    /* ── Process doc card (matched to app) ── */
    .process-doc-card{
      background:#ffffff;
      border:1px solid #e4e4e4;
      border-left:3px solid #111111;
      border-radius:20px;
      padding:14px 16px;
      width:100%;
      cursor:default;
      display:flex;
      flex-direction:column;
      gap:12px;
      transition:background .2s ease,border-color .2s ease;
    }
    .process-doc-top{display:flex;justify-content:space-between;align-items:center}
    .process-doc-type{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:8px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#aaaaaa;
    }
    .process-doc-icon{font-size:18px;line-height:1}
    .process-doc-title{
      font-family:Georgia, serif;
      font-size:18px;
      font-weight:500;
      color:#111111;
      line-height:1.35;
      margin:0;
    }
    .process-doc-preview{
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size:14px;
      color:#666666;
      line-height:1.45;
      margin:0;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .process-doc-bottom{display:flex;justify-content:space-between;align-items:center}
    .process-doc-open{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:9px;
      letter-spacing:.05em;
      color:#00000073;
      border:none;
      background:none;
      padding:0;
      cursor:default;
    }
    .process-doc-updated{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:9px;
      letter-spacing:.05em;
      color:#aaaaaa;
    }

    /* ── Thoughts cards collage (landscape 2-row layout) ── */
    .landing-process-grid-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .landing-process-grid {
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: repeat(3, 200px);
      gap: 32px;
      justify-content: center;
    }
    .landing-process-card {
      background: #ffffff;
      border: 1px solid #ececec;
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
    }
    .landing-process-card--square {
      width: 200px;
      height: 200px;
    }
    .landing-process-card--doc {
      grid-column: span 2;
      display: block;
      padding: 0;
      border: none;
      background: transparent;
      height: 200px;
    }
    .landing-process-card--doc .process-doc-card {
      height: 100%;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
      padding: 18px 18px 14px;
      gap: 0;
    }
    .landing-process-card--doc .process-doc-top {
      margin-bottom: 26px;
    }
    .landing-process-card--doc .process-doc-title {
      margin-top: 0;
    }
    .landing-process-card--doc .process-doc-preview {
      margin-top: 8px;
    }
    .landing-process-card--doc .process-doc-bottom {
      margin-top: auto;
    }
    .landing-process-card--image {
      padding: 0;
      border: none;
      overflow: hidden;
      background: transparent;
    }
    .landing-process-card--decision {
      background: #111111;
      border-color: #111111;
    }
    .landing-process-card--decision .landing-process-meta-item {
      color: rgba(255, 255, 255, 0.5);
    }
    .landing-process-card--decision .landing-process-meta {
      justify-content: flex-start;
    }
    .landing-process-card--decision .landing-process-decision-check,
    .landing-process-card--decision .landing-process-decision-text {
      color: #f2f2f2;
    }
    .landing-process-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .landing-process-meta-item {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .05em;
      color: #adadad;
      text-transform: uppercase;
    }
    .landing-process-note-body {
      margin-top: auto;
      padding: 8px 10px;
      border-radius: 10px;
      background-image: repeating-linear-gradient(transparent 0px, transparent 18px, rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 19px);
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 16px;
      line-height: 1.35;
      color: #111111;
      font-weight: 500;
    }
    .landing-process-link-main {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
    .landing-process-link-logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #f2f2f2;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .landing-process-link-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .landing-process-link-title {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 14px;
      font-weight: 600;
      color: #111111;
      line-height: 1.35;
    }
    .landing-process-link-url {
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      color: #a8a8a8;
      letter-spacing: .03em;
      text-transform: lowercase;
    }
    .landing-process-image {
      margin-top: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      aspect-ratio: auto;
      object-fit: cover;
    }
    .landing-process-decision-body {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .landing-process-decision-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .landing-process-decision-check {
      color: #111111;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .landing-process-decision-text {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.4;
      color: #111111;
      font-weight: 500;
    }
    .landing-process-decision-label {
      margin-top: auto;
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      align-self: flex-start;
    }

    /* ── Project view mobile showcase (from Flowd app) ── */
    .landing-project-mobile-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 6px 0 14px;
    }
    .landing-project-mobile-frame {
      width: min(430px, 100%);
      border-radius: 24px;
      border: 1px solid #d9d9d9;
      background: rgba(0, 0, 0, 0.05);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.18);
      padding: 10px;
    }
    .landing-project-mobile-screen {
      border-radius: 18px;
      border: 1px solid #e9e9e9;
      background: #ececec;
      overflow: hidden;
      height: min(76vh, 800px);
    }
    .landing-project-mobile-scroll {
      height: 100%;
      overflow-y: auto;
      padding: 24px;
      background: transparent;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .landing-project-mobile-scroll::-webkit-scrollbar { display: none; }
    .landing-project-mobile-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
    }
    .landing-project-mobile-nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .landing-project-mobile-back {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: #e7e7e4;
      color: #111;
      font-size: 12px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .landing-project-mobile-back-label {
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .05em;
      color: #9f9f9f;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .landing-project-mobile-menu {
      border: none;
      background: transparent;
      color: #8f8f8f;
      font-size: 16px;
      line-height: 1;
      padding: 4px 6px;
    }
    .landing-project-mobile-header {
      padding: 0 2px 10px;
    }
    .landing-project-mobile-meta {
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .05em;
      color: #aaaaaa;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .landing-project-mobile-title {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 34px;
      line-height: 1.03;
      letter-spacing: -0.02em;
      color: #111;
      font-weight: 500;
    }
    .landing-project-mobile-sub {
      margin: 8px 0 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      line-height: 1.35;
      color: #7f7f7f;
      max-width: 36ch;
    }
    .landing-project-mobile-tabs {
      margin: 20px 0 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px 20px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .landing-project-mobile-tabs::-webkit-scrollbar { display: none; }
    .landing-project-mobile-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: transparent;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 16px;
      font-weight: 600;
      color: #111111;
      white-space: nowrap;
      opacity: 0.2;
      flex-shrink: 0;
      cursor: default;
    }
    .landing-project-mobile-tab-dot {
      width: 20px;
      height: 20px;
      border-radius: 51px;
      background: #111111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .landing-project-mobile-tab-dot::before {
      content: "+";
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      color: #ffffff;
    }
    .landing-project-mobile-tab.active { opacity: 1; }
    .landing-project-mobile-cards {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-bottom: 4px;
    }
    .landing-project-mobile-card {
      background: rgba(255, 255, 255, 0.2) !important;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 16px 30px 5px rgba(21, 21, 32, 0.10);
    }
    .landing-project-mobile-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .landing-project-mobile-card-label,
    .landing-project-mobile-card-meta {
      font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 9px;
      letter-spacing: .06em;
      color: #c0c0c0;
      text-transform: uppercase;
    }
    .landing-project-mobile-card-title {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 20px;
      line-height: 1.2;

      const [scrolled, setScrolled] = React.useState(false);
      React.useEffect(() => {
        const handler = () => setScrolled(window.scrollY > threshold);
        window.addEventListener("scroll", handler, { passive: true });
        return () => window.removeEventListener("scroll", handler);
      }, [threshold]);
      return scrolled;

    function MediaCard({ children, hairline, isDark, className = "" }) {
      const [glow, setGlow] = React.useState({ x: 50, y: 50, show: false });
      const handleMove = (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        setGlow({ x: ((e.clientX - r.left) / r.width) * 100, y: ((e.clientY - r.top) / r.height) * 100, show: true });
      };
      const handleLeave = () => setGlow(g => ({ ...g, show: false }));
      return (
        <div
          className={`media-card-wrapper relative overflow-hidden rounded-3xl border ${hairline} ${isDark ? "bg-white/5" : "bg-black/5"} shadow-[0_30px_70px_rgba(0,0,0,0.18)] ${className}`}
          onMouseMove={handleMove}
          onMouseLeave={handleLeave}
        >
          {children}
          <div
            className="pointer-events-none absolute inset-0"
            style={{
              opacity: glow.show ? 1 : 0,
              transition: "opacity 0.4s ease",
              background: `radial-gradient(320px 220px at ${glow.x}% ${glow.y}%, ${isDark ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.65)"}, transparent 70%)`,

          />
        </div>
      );

    function FlowdLandingPage() {
      React.useEffect(() => {

        if (nodes.length === 0) return undefined;
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              // Apply staggered delay from data attribute before triggering transition
              const delay = entry.target.dataset.revealDelay || "0";
              entry.target.style.setProperty("--reveal-delay", `${delay}ms`);
              entry.target.classList.add("in-view");
              observer.unobserve(entry.target);
            });
          },
          { threshold: 0.10, rootMargin: "0px 0px -6% 0px" },
        );
        nodes.forEach((node) => observer.observe(node));
        return () => observer.disconnect();
